<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音监控</title>
    <style>
        :root {
            --bg: #fff;
            --fg: #333;
            --border: #e8e8e8;
            --primary: #1a73e8;
            --muted: #999;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e2e;
                --fg: #cdd6f4;
                --border: #313244;
                --muted: #6c7086;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            font-size: 13px;
        }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .header h2 { font-size: 16px; display: flex; align-items: center; gap: 6px; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat {
            text-align: center;
            padding: 8px 4px;
            background: var(--border);
            border-radius: 8px;
        }
        .stat .num { font-size: 20px; font-weight: 700; color: var(--primary); display: block; }
        .stat .label { font-size: 11px; color: var(--muted); }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            background: var(--border);
            color: var(--fg);
            transition: all 0.15s;
            min-width: 65px;
        }
        .actions button:hover { opacity: 0.8; }
        .actions .primary { background: var(--primary); color: #fff; }
        .actions .danger { background: #e74c3c; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🎯 抖音监控</h2>
        <span style="font-size:11px;color:var(--muted)">v2.0</span>
    </div>

    <div class="stats">
        <div class="stat"><span class="num" id="stat-total">-</span><span class="label">商品</span></div>
        <div class="stat"><span class="num" id="stat-new" style="color:#27ae60">-</span><span class="label">新品</span></div>
        <div class="stat"><span class="num" id="stat-changed" style="color:#f39c12">-</span><span class="label">变化</span></div>
    </div>

    <div class="actions">
        <button class="primary" id="btn-open">📊 面板</button>
        <button class="primary" id="btn-scan">🔍 扫描</button>
        <button id="btn-export">📤 导出</button>
        <button class="danger" id="btn-clear">🗑️</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
